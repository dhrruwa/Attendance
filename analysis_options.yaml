include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    prefer_single_quotes: true
    always_declare_return_types: true
    avoid_print: false # CLI/probe harness uses print intentionally
    # require_trailing_commas intentionally omitted: the Dart 3.12 formatter
    # manages commas itself and the lint conflicts with it.
