name: ble_probe
description: Step-One BLE proving harness — advertise a rotating value + scan to determine which payload mechanism survives all four Android/iOS combos.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  # Same plugins as the production BLE path, so the probe validates exactly what
  # the apps will use. universal_ble can be swapped in to evaluate single-plugin.
  flutter_blue_plus: ^2.3.8
  ble_peripheral: ^2.4.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
